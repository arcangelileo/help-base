{% extends "layouts/base.html" %}

{% block body %}
<div class="min-h-full flex flex-col">
    <!-- Dashboard Nav -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="/dashboard" class="flex items-center space-x-2">
                        <div class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                            </svg>
                        </div>
                        <span class="text-xl font-bold text-gray-900">HelpBase</span>
                    </a>
                    <div class="hidden sm:flex items-center space-x-1">
                        {% block nav_items %}
                        <a href="/dashboard" class="px-3 py-2 text-sm font-medium text-brand-600 bg-brand-50 rounded-lg">Dashboard</a>
                        {% endblock %}
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <div class="hidden sm:flex items-center space-x-3">
                        <div class="w-8 h-8 bg-brand-100 rounded-full flex items-center justify-center">
                            <span class="text-sm font-medium text-brand-700">{{ user.full_name[0]|upper }}</span>
                        </div>
                        <span class="text-sm font-medium text-gray-700">{{ user.full_name }}</span>
                    </div>
                    <a href="/auth/logout" class="hidden sm:inline-flex text-sm font-medium text-gray-500 hover:text-gray-700 transition-colors">Sign out</a>
                    <!-- Mobile menu button -->
                    <button type="button" id="mobile-menu-btn" class="sm:hidden inline-flex items-center justify-center p-2 rounded-lg text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-colors" aria-label="Open menu">
                        <svg class="w-5 h-5" id="mobile-menu-icon-open" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                        <svg class="w-5 h-5 hidden" id="mobile-menu-icon-close" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile menu panel -->
        <div class="sm:hidden hidden border-t border-gray-200 bg-gray-50" id="mobile-menu-panel">
            <div class="px-4 py-3 space-y-1" id="mobile-nav-links"></div>
            <div class="px-4 py-3 border-t border-gray-200">
                <div class="flex items-center space-x-3 mb-3">
                    <div class="w-8 h-8 bg-brand-100 rounded-full flex items-center justify-center">
                        <span class="text-sm font-medium text-brand-700">{{ user.full_name[0]|upper }}</span>
                    </div>
                    <span class="text-sm font-medium text-gray-700">{{ user.full_name }}</span>
                </div>
                <a href="/auth/logout" class="block px-3 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors">Sign out</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="flex-1">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>

<script>
(function() {
    var btn = document.getElementById('mobile-menu-btn');
    var panel = document.getElementById('mobile-menu-panel');
    var iconOpen = document.getElementById('mobile-menu-icon-open');
    var iconClose = document.getElementById('mobile-menu-icon-close');
    var mobileNav = document.getElementById('mobile-nav-links');
    // Clone desktop nav links into mobile menu
    var desktopLinks = document.querySelectorAll('.hidden.sm\\:flex.items-center a');
    desktopLinks.forEach(function(link) {
        var clone = link.cloneNode(true);
        clone.className = 'block px-3 py-2 text-sm font-medium rounded-lg transition-colors ' +
            (link.classList.contains('bg-brand-50') ? 'text-brand-600 bg-brand-50' : 'text-gray-600 hover:text-gray-900 hover:bg-gray-100');
        mobileNav.appendChild(clone);
    });
    if (btn && panel) {
        btn.addEventListener('click', function() {
            panel.classList.toggle('hidden');
            iconOpen.classList.toggle('hidden');
            iconClose.classList.toggle('hidden');
        });
    }
})();
</script>
{% endblock %}
